<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Fashion Store</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

/* HEADER */
header{
    background:#111;
    color:white;
    padding:15px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}
header h1{margin:0;}
nav a{
    color:white;
    margin-left:20px;
    text-decoration:none;
}
.search-box input{
    padding:6px;
}

/* HERO */
.hero{
    background:#222;
    color:white;
    text-align:center;
    padding:60px 20px;
    font-size:32px;
}

/* CONTAINER */
.container{
    padding:30px;
}

/* CATEGORY FILTER */
.filters button{
    padding:8px 15px;
    margin:5px;
    border:none;
    background:#111;
    color:white;
    cursor:pointer;
}

/* PRODUCTS */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}
.product{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    text-align:center;
}
.product img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:8px;
}
.price{
    color:green;
    font-weight:bold;
}
button{
    padding:8px 15px;
    border:none;
    background:#111;
    color:white;
    cursor:pointer;
    border-radius:5px;
}
button:hover{
    background:#444;
}

/* CART */
.cart{
    position:fixed;
    right:0;
    top:0;
    width:300px;
    height:100%;
    background:white;
    box-shadow:-3px 0 8px rgba(0,0,0,0.2);
    padding:20px;
    overflow:auto;
    display:none;
}
.cart h2{text-align:center;}
.cart-item{
    border-bottom:1px solid #ddd;
    padding:10px 0;
}
.cart-total{
    font-weight:bold;
    margin-top:10px;
}

/* ADMIN */
.admin{
    background:#fff;
    padding:20px;
    margin-top:40px;
    border-radius:10px;
}
.admin input, .admin select{
    width:100%;
    padding:8px;
    margin:5px 0;
}

footer{
    background:#111;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>

<body>

<header>
    <h1>Elite Fashion Store</h1>
    <div>
        <input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
        <button onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
    </div>
</header>

<div class="hero">
    New Collection 2026
</div>

<div class="container">

    <div class="filters">
        <button onclick="filterCategory('All')">All</button>
        <button onclick="filterCategory('Men')">Men</button>
        <button onclick="filterCategory('Women')">Women</button>
        <button onclick="filterCategory('Kids')">Kids</button>
    </div>

    <div class="products" id="product-list"></div>

    <!-- ADMIN PANEL -->
    <div class="admin">
        <h2>Add New Product</h2>
        <input type="text" id="pname" placeholder="Product Name">
        <input type="text" id="pimage" placeholder="Image URL">
        <input type="number" id="pprice" placeholder="Price">
        <select id="pcategory">
            <option>Men</option>
            <option>Women</option>
            <option>Kids</option>
        </select>
        <button onclick="addProduct()">Add Product</button>
    </div>

</div>

<!-- CART -->
<div class="cart" id="cart">
    <h2>Your Cart</h2>
    <div id="cart-items"></div>
    <p class="cart-total">Total: $<span id="total">0</span></p>
    <button onclick="checkout()">Checkout via WhatsApp</button>
</div>

<footer>
    © 2026 Elite Fashion Store | Phone: +123456789 | Email: your@email.com
</footer>

<script>
let products = [
    {name:"Men T-Shirt", price:25, category:"Men", image:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"},
    {name:"Women Dress", price:45, category:"Women", image:"https://images.unsplash.com/photo-1490481651871-ab68de25d43d"},
    {name:"Kids Jacket", price:35, category:"Kids", image:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function displayProducts(list){
    let output="";
    list.forEach((p,index)=>{
        output+=`
        <div class="product">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p class="price">$${p.price}</p>
            <button onclick="addToCart(${index})">Add to Cart</button>
        </div>`;
    });
    document.getElementById("product-list").innerHTML=output;
}

function addProduct(){
    let name=document.getElementById("pname").value;
    let image=document.getElementById("pimage").value;
    let price=document.getElementById("pprice").value;
    let category=document.getElementById("pcategory").value;
    products.push({name,price,category,image});
    displayProducts(products);
}

function filterCategory(cat){
    if(cat=="All") displayProducts(products);
    else displayProducts(products.filter(p=>p.category==cat));
}

function searchProducts(){
    let value=document.getElementById("search").value.toLowerCase();
    displayProducts(products.filter(p=>p.name.toLowerCase().includes(value)));
}

function addToCart(index){
    cart.push(products[index]);
    localStorage.setItem("cart",JSON.stringify(cart));
    updateCart();
}

function updateCart(){
    let items="";
    let total=0;
    cart.forEach(item=>{
        total+=Number(item.price);
        items+=`<div class="cart-item">${item.name} - $${item.price}</div>`;
    });
    document.getElementById("cart-items").innerHTML=items;
    document.getElementById("total").innerText=total;
    document.getElementById("cart-count").innerText=cart.length;
}

function toggleCart(){
    let cartDiv=document.getElementById("cart");
    cartDiv.style.display = cartDiv.style.display=="block"?"none":"block";
}

function checkout(){
    let message="Order Details:%0A";
    cart.forEach(item=>{
        message+=item.name+" - $"+item.price+"%0A";
    });
    window.open("https://wa.me/123456789?text="+message);
}

displayProducts(products);
updateCart();
</script>

</body>
</html>
